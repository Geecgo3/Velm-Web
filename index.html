<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VELM</title>
<link rel="icon" type="image/png" href="06a244a6-a729-487a-9467-78c38fed1527(2).png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,sans-serif}
body{background:#141414;color:#fff;overflow:hidden}
#loader{position:fixed;inset:0;background:#141414;display:flex;justify-content:center;align-items:center;flex-direction:column;z-index:99;transition:.7s}
#loader img{width:170px;animation:pop .8s ease}
#loader p{margin-top:18px;color:#9ecfff;letter-spacing:6px}
@keyframes pop{0%{opacity:0;transform:scale(.7)}70%{transform:scale(1.08)}100%{opacity:1;transform:scale(1)}}
#bg{position:fixed;inset:0;background:radial-gradient(circle at top,#202020,#141414 70%);z-index:-5;overflow:hidden}
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:50px 50px;animation:grid 18s linear infinite}
@keyframes grid{to{transform:translateY(50px)}}
.ball{position:absolute;border-radius:50%;background:rgba(0,140,255,.11);border:1px solid rgba(0,170,255,.18);animation:float linear infinite}
@keyframes float{from{transform:translateY(120vh)}to{transform:translateY(-130vh) translateX(150px)}}
#glow{position:fixed;width:350px;height:350px;border-radius:50%;pointer-events:none;background:radial-gradient(circle,rgba(0,140,255,.2),transparent 70%);filter:blur(55px);transform:translate(-50%,-50%)}
.hero{height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:30px}
.logo,.title,.subtitle,.buttons button{opacity:0;transform:translateY(24px)}
.logo img{width:140px;filter:drop-shadow(0 0 25px rgba(0,170,255,.35))}
.title{font-size:56px;letter-spacing:8px;margin-top:22px}
.subtitle{color:#9099a6;margin:12px 0 45px}
.buttons{width:360px;display:flex;flex-direction:column;gap:16px}
button{position:relative;overflow:hidden;height:68px;background:#1f1f1f;color:#fff;border:none;border-left:4px solid #00aaff;border-radius:14px;padding-left:24px;text-align:left;font-size:18px;cursor:pointer;transition:.28s}
button::before{content:"";position:absolute;left:0;top:0;width:4px;height:100%;background:#00aaff;transition:.28s}
button::after{content:"→";position:absolute;right:24px;top:50%;transform:translateY(-50%);color:#9ecfff;transition:.28s}
button:hover::before{width:8px}
button:hover::after{right:18px}
button:hover{transform:translateX(10px);background:#282828;box-shadow:0 0 18px rgba(0,170,255,.25)}
button:active{transform:translateX(10px) scale(.98)}
.show{animation:in .7s forwards}
@keyframes in{to{opacity:1;transform:translateY(0)}}

.trusted{margin:10px 0 34px;width:100%;display:flex;flex-direction:column;align-items:center}
.stars{color:#FFD95A;font-size:22px;letter-spacing:4px;margin-bottom:8px}
.trusted-title{color:#b8c1cf;font-size:15px;font-weight:600;margin-bottom:18px}
.logo-banner{width:650px;margin-bottom:30px;overflow:hidden;mask-image:linear-gradient(to right,transparent,white 12%,white 88%,transparent);-webkit-mask-image:linear-gradient(to right,transparent,white 12%,white 88%,transparent)}
.logo-track{display:flex;align-items:center;gap:55px;width:max-content;animation:scrollLogos 24s linear infinite}
.logo-track img{height:52px;opacity:.75;transition:.3s}.logo-track img:hover{opacity:1;transform:scale(1.08)}
@keyframes scrollLogos{from{transform:translateX(0)}to{transform:translateX(-50%)}}
</style></head><body>
<div id="loader"><img src="06a244a6-a729-487a-9467-78c38fed1527.png"><p>LOADING</p></div>
<div id="bg"><div class="grid"></div></div><div id="glow"></div>
<div class="hero"><div class="trusted">
<div class="stars">★★★★★</div>
<div class="trusted-title">Trusted By</div>
<div class="logo-banner"><div class="logo-track">
<img src="mcp(1).png"><img src="icon(1).png"><img src="luaarmor(1).png"><img src="c655eefc541f4329fd7cfd84d73954f7c67888e7(1).png">
<img src="mcp(1).png"><img src="icon(1).png"><img src="luaarmor(1).png"><img src="c655eefc541f4329fd7cfd84d73954f7c67888e7(1).png">
</div></div></div>
<div class="logo"><img src="06a244a6-a729-487a-9467-78c38fed1527.png"></div>
<div class="title">VELM</div>
<div class="subtitle">Modern. Fast. Reliable.</div>


<div class="buttons">
<button onclick="window.location.href='https://downloadlink.com'">Download</button>
<button onclick="window.location.href='https://doc.com'">Documentation</button>
<button onclick="window.location.href='https://discord.gg/PrCEapXSq9'">Community</button>
</div>
</div>
<script>
const bg=document.getElementById('bg');
for(let i=0;i<45;i++){let b=document.createElement('div');b.className='ball';let s=20+Math.random()*170;b.style.width=s+'px';b.style.height=s+'px';b.style.left=Math.random()*100+'vw';b.style.opacity=Math.random()*.4+.08;b.style.animationDuration=(18+Math.random()*30)+'s';b.style.animationDelay=(-Math.random()*30)+'s';bg.appendChild(b);}
document.addEventListener('mousemove',e=>{glow.style.left=e.clientX+'px';glow.style.top=e.clientY+'px';});
window.onload=()=>{setTimeout(()=>{loader.style.opacity=0;loader.style.pointerEvents='none';
['.logo','.title','.subtitle','.buttons button:nth-child(1)','.buttons button:nth-child(2)','.buttons button:nth-child(3)']
.forEach((s,i)=>setTimeout(()=>document.querySelector(s).classList.add('show'),i*150));
},900);}
</script>
</body></html>
